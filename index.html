
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCA Contractor Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <div class="group">
        <label>Company Name</label>
        <input type="text" value="KALOYARA COMPANY LIMITED" readonly>
    </div>

    <div class="group">
        <label>Licence Number</label>
        <input type="text" value="86480/B/0831" readonly>
    </div>

    <div class="group">
        <label>Category</label>
        <input type="text" value="NCA5" readonly>
    </div>

    <div class="group">
        <label>Class</label>
        <input type="text" value="BUILDING WORKS" readonly>
    </div>

    <div class="group">
        <label>License Expiry Date</label>

        <div class="status-row">
            <div class="status-input">
                7/31/2026 9:00:00 PM
            </div>

            <div class="valid-box">
                <span class="check-circle">
                    <span class="check">✓</span>
                </span>
                valid
            </div>
        </div>
    </div>

    <div class="group">
        <label>Certificate Expiry Date</label>

        <div class="status-row">
            <div class="status-input">
                7/31/2028 9:00:00 PM
            </div>

            <div class="valid-box">
                <span class="check-circle">
                    <span class="check">✓</span>
                </span>
                valid
            </div>
        </div>
    </div>

</div>

</body>
</html>
